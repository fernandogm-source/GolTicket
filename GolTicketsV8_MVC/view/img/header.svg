<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a3a6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#4da6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="120" fill="url(#headerGrad)"/>

  <!-- Subtle field lines -->
  <ellipse cx="400" cy="130" rx="220" ry="90" fill="none" stroke="#1e4a8a" stroke-width="1.5" opacity="0.5"/>
  <line x1="400" y1="0" x2="400" y2="120" stroke="#1e4a8a" stroke-width="1" opacity="0.4"/>
  <rect x="310" y="50" width="180" height="70" fill="none" stroke="#1e4a8a" stroke-width="1" opacity="0.3"/>

  <!-- Stars/sparkles -->
  <circle cx="60" cy="25" r="1.5" fill="#4da6ff" opacity="0.7"/>
  <circle cx="150" cy="55" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="680" cy="20" r="1.5" fill="#4da6ff" opacity="0.7"/>
  <circle cx="740" cy="65" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="200" cy="90" r="1" fill="#4da6ff" opacity="0.4"/>
  <circle cx="600" cy="85" r="1.2" fill="#4da6ff" opacity="0.6"/>

  <!-- Football (left) -->
  <g transform="translate(80, 60)" filter="url(#glow)">
    <circle cx="0" cy="0" r="28" fill="#f0f0f0" stroke="#cccccc" stroke-width="1"/>
    <path d="M0,-28 L6,-10 L20,-18 Z" fill="#222"/>
    <path d="M0,-28 L-6,-10 L-20,-18 Z" fill="#222"/>
    <path d="M22,16 L8,6 L20,-18 Z" fill="#222"/>
    <path d="M-22,16 L-8,6 L-20,-18 Z" fill="#222"/>
    <path d="M0,28 L8,6 L-8,6 Z" fill="#222"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#aaa" stroke-width="0.5"/>
  </g>

  <!-- Football (right) -->
  <g transform="translate(720, 60)" filter="url(#glow)">
    <circle cx="0" cy="0" r="22" fill="#f0f0f0" stroke="#cccccc" stroke-width="1"/>
    <path d="M0,-22 L5,-8 L16,-14 Z" fill="#222"/>
    <path d="M0,-22 L-5,-8 L-16,-14 Z" fill="#222"/>
    <path d="M17,12 L6,5 L16,-14 Z" fill="#222"/>
    <path d="M-17,12 L-6,5 L-16,-14 Z" fill="#222"/>
    <path d="M0,22 L6,5 L-6,5 Z" fill="#222"/>
  </g>

  <!-- Main title: GOL en blanco, TICKETS en azul claro -->
  <text x="400" y="54" font-family="'Georgia', serif" font-size="44" font-weight="bold"
        text-anchor="middle" filter="url(#glow)">
    <tspan fill="#ffffff" letter-spacing="3">GOL </tspan><tspan fill="#4da6ff" letter-spacing="3">TICKETS</tspan>
  </text>

  <!-- Subtitle -->
  <text x="400" y="80" font-family="'Arial', sans-serif" font-size="12"
        text-anchor="middle" fill="#a8d4ff" letter-spacing="5" opacity="0.85">
    TODAS LAS LIGAS · TODOS LOS TORNEOS
  </text>

  <!-- Bottom accent line -->
  <rect x="0" y="115" width="800" height="3" fill="url(#lineGrad)"/>
  <rect x="0" y="118" width="800" height="2" fill="#1a3a6b" opacity="0.5"/>
</svg>
