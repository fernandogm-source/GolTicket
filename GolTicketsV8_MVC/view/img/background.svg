  <path d="M360,140 Q380,140 380,160" fill="none" stroke="#a0c4e8" stroke-width="1.5" opacity="0.3"/>
  <path d="M1560,140 Q1540,140 1540,160" fill="none" stroke="#a0c4e8" stroke-width="1.5" opacity="0.3"/>
  <path d="M360,940 Q380,940 380,920" fill="none" stroke="#a0c4e8" stroke-width="1.5" opacity="0.3"/>
  <path d="M1560,940 Q1540,940 1540,920" fill="none" stroke="#a0c4e8" stroke-width="1.5" opacity="0.3"/>
