      <stop offset="0%" style="stop-color:#ddeeff"/>
      <stop offset="100%" style="stop-color:#c5dcf5"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- Faint field lines -->
  <rect x="360" y="140" width="1200" height="800" fill="none" stroke="#a0c4e8" stroke-width="2" opacity="0.4"/>
  <line x1="960" y1="140" x2="960" y2="940" stroke="#a0c4e8" stroke-width="1.5" opacity="0.35"/>
