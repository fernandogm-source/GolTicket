  <circle cx="960" cy="540" r="6" fill="#a0c4e8" opacity="0.4"/>

  <!-- Penalty boxes -->
  <rect x="360" y="340" width="280" height="400" fill="none" stroke="#a0c4e8" stroke-width="1.5" opacity="0.3"/>
  <rect x="1280" y="340" width="280" height="400" fill="none" stroke="#a0c4e8" stroke-width="1.5" opacity="0.3"/>

  <!-- Goal areas -->
  <rect x="360" y="440" width="100" height="200" fill="none" stroke="#a0c4e8" stroke-width="1.5" opacity="0.25"/>
  <rect x="1460" y="440" width="100" height="200" fill="none" stroke="#a0c4e8" stroke-width="1.5" opacity="0.25"/>

