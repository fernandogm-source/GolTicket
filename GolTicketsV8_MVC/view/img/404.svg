<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bgGrad404" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4ff"/>
      <stop offset="100%" style="stop-color:#cce0ff"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="16" fill="url(#bgGrad404)"/>

  <!-- Goalposts -->
  <rect x="220" y="60" width="8" height="200" fill="#1a4a9e" rx="4"/>
  <rect x="372" y="60" width="8" height="200" fill="#1a4a9e" rx="4"/>
  <rect x="215" y="55" width="170" height="8" fill="#1a4a9e" rx="4"/>
  <!-- Net lines -->
  <line x1="228" y1="68" x2="228" y2="260" stroke="#5a8ad0" stroke-width="0.8" opacity="0.5"/>
  <line x1="258" y1="68" x2="258" y2="260" stroke="#5a8ad0" stroke-width="0.8" opacity="0.5"/>
  <line x1="288" y1="68" x2="288" y2="260" stroke="#5a8ad0" stroke-width="0.8" opacity="0.5"/>
  <line x1="318" y1="68" x2="318" y2="260" stroke="#5a8ad0" stroke-width="0.8" opacity="0.5"/>
  <line x1="348" y1="68" x2="348" y2="260" stroke="#5a8ad0" stroke-width="0.8" opacity="0.5"/>
  <line x1="228" y1="95" x2="372" y2="95" stroke="#5a8ad0" stroke-width="0.8" opacity="0.5"/>
  <line x1="228" y1="130" x2="372" y2="130" stroke="#5a8ad0" stroke-width="0.8" opacity="0.5"/>
  <line x1="228" y1="165" x2="372" y2="165" stroke="#5a8ad0" stroke-width="0.8" opacity="0.5"/>
  <line x1="228" y1="200" x2="372" y2="200" stroke="#5a8ad0" stroke-width="0.8" opacity="0.5"/>

  <!-- Football flying past the goal -->
  <g transform="translate(430, 130) rotate(20)">
    <circle cx="0" cy="0" r="32" fill="#f5f5f5" stroke="#ccc" stroke-width="1.5"/>
    <path d="M0,-32 L7,-11 L23,-20 Z" fill="#222"/>
    <path d="M0,-32 L-7,-11 L-23,-20 Z" fill="#222"/>
    <path d="M25,18 L9,7 L23,-20 Z" fill="#222"/>
    <path d="M-25,18 L-9,7 L-23,-20 Z" fill="#222"/>
    <path d="M0,32 L9,7 L-9,7 Z" fill="#222"/>
  </g>
  <!-- Motion lines for ball -->
  <line x1="390" y1="100" x2="415" y2="108" stroke="#4da6ff" stroke-width="2" opacity="0.6" stroke-dasharray="5,3"/>
  <line x1="388" y1="118" x2="413" y2="122" stroke="#4da6ff" stroke-width="2" opacity="0.5" stroke-dasharray="5,3"/>
  <line x1="392" y1="136" x2="414" y2="136" stroke="#4da6ff" stroke-width="1.5" opacity="0.4" stroke-dasharray="5,3"/>

  <!-- 404 text -->
  <text x="300" y="315" font-family="'Georgia', serif" font-size="72" font-weight="bold"
        text-anchor="middle" fill="#0d2b5e" opacity="0.9">404</text>
  <text x="300" y="350" font-family="'Arial', sans-serif" font-size="18"
        text-anchor="middle" fill="#2a5fa8">¡La página salió fuera del campo!</text>
  <text x="300" y="375" font-family="'Arial', sans-serif" font-size="14"
        text-anchor="middle" fill="#5a8ad0">La página que buscas no existe</text>
</svg>
